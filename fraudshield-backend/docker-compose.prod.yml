version: "3.8"

services:
  # PostgreSQL Database (Data is persisted in /var/lib/postgresql/data)
  postgres:
    image: postgres:16.7-alpine
    container_name: fraudshield-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraudshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fraudshield}
    # No ports exposed to public for security
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudshield"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache (Required for Bull queues)
  redis:
    image: redis:7.4-alpine
    container_name: fraudshield-redis-prod
    restart: always
