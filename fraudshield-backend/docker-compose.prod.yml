version: "3.8"

services:
  # PostgreSQL Database (Data is persisted in /var/lib/postgresql/data)
  postgres:
    image: postgres:16-alpine
    container_name: fraudshield-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fraudshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-fraudshield}
    # No ports exposed to public for security
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  # Redis Cache (Required for Bull queues)
  redis:
    image: redis:7-alpine
    container_name: fraudshield-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    # No ports exposed to public

  # API Server
  api:
    build: .
    container_name: fraudshield-api-prod
    restart: always
    # Ports removed for security (only accessible via nginx)
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3000
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

  # Nginx Reverse Proxy
  nginx:
    image: nginx:stable-alpine
    container_name: fraudshield-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    depends_on:
      - api

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: fraudshield-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data_prod:
